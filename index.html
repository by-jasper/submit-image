<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Team Photo Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #ffffff;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .top-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin-top: 15px;
    }

    .qr-box img {
      width: 160px;
      height: 160px;
    }

    .instruction {
      font-size: 22px;
      text-align: left;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 18px;
      padding: 25px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      margin: 5px 0 10px;
      font-size: 24px;
    }

    .photo-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eeeeee;
      border-radius: 12px;
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .empty {
      color: #777;
      font-size: 18px;
    }

    .last-updated {
      font-size: 14px;
      color: #777;
      margin-bottom: 10px;
    }

    .status-message {
      margin: 14px auto 0;
      max-width: 760px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.4;
      display: none;
    }

    .status-message.error {
      display: block;
      background: #ffecec;
      border: 1px solid #f5a6a6;
      color: #8a1f1f;
    }

    .status-message.info {
      display: block;
      background: #eef6ff;
      border: 1px solid #99c7f3;
      color: #1f4f7a;
    }
  </style>
</head>

<body>

  <header>
    <h1>Team Photo Wall</h1>

    <div class="top-section">
      <div class="qr-box">
        <img id="qrCode" src="">
      </div>

      <div class="instruction">
        <strong>Scan to upload photo</strong><br>
        Select your team and submit one photo.<br>
        Latest upload will replace previous photo.
      </div>
    </div>
  </header>

  <div class="grid" id="photoGrid"></div>

  <div class="status-message" id="statusMessage"></div>

  <div class="last-updated" id="lastUpdated"></div>

  <script>
    const TALLY_FORM_URL = "https://tally.so/r/aQAK92";
    // Replace with your actual Tally form link. Tally must also have its
    // Google Sheets integration enabled, otherwise scans will not create rows.

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxc49ueWgAbUkW0XIAjMjaoeXxXhNUNMPeczHcsOuE7i0-i4-cSbYKbCnwd9k9xkJfOsw/exec";
    // IMPORTANT: Use the original Apps Script Web App URL that looks like:
    // https://script.google.com/macros/s/DEPLOYMENT_ID/exec
    // Do not paste the redirected script.googleusercontent.com/macros/echo URL;
    // those links are temporary and will stop returning sheet data.

    const statusMessage = document.getElementById("statusMessage");

    function showStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${type}`;
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "status-message";
    }

    function isTemporaryAppsScriptUrl(url) {
      return url.includes("script.googleusercontent.com/macros/echo");
    }

    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
      + encodeURIComponent(TALLY_FORM_URL);

    document.getElementById("qrCode").src = qrUrl;

    async function loadPhotos() {
      if (isTemporaryAppsScriptUrl(APPS_SCRIPT_URL)) {
        showStatus(
          "Apps Script URL is a temporary redirected googleusercontent.com link. Replace APPS_SCRIPT_URL in index.html with the original https://script.google.com/macros/s/.../exec Web App URL, then redeploy this page.",
          "error"
        );
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Apps Script returned HTTP ${response.status}`);
        }

        const teams = await response.json();

        if (!Array.isArray(teams)) {
          throw new Error("Apps Script response must be a JSON array of teams.");
        }

        const grid = document.getElementById("photoGrid");
        grid.innerHTML = "";

        teams.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h2>${item.team}</h2>
            <div class="photo-box">
              ${
                item.photo
                ? `<img src="${item.photo}" alt="${item.team} photo">`
                : `<div class="empty">No photo uploaded</div>`
              }
            </div>
          `;

          grid.appendChild(card);
        });

        clearStatus();
        document.getElementById("lastUpdated").innerText =
          "Last updated: " + new Date().toLocaleTimeString();

      } catch (error) {
        console.error("Error loading photos:", error);
        showStatus(`Could not load Google Sheet data: ${error.message}`, "error");
      }
    }

    loadPhotos();

    setInterval(loadPhotos, 5000);
  </script>

</body>
</html>

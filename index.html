<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Future Workplace with AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #ffffff;
      padding: 12px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-align: left;
    }

    .top-section {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 22px;
      margin-top: 8px;
    }

    .qr-box img {
      width: 120px;
      height: 120px;
    }

    .instruction {
      flex: 1;
      font-size: 18px;
      line-height: 1.3;
      text-align: left;
    }

    .instruction strong {
      display: block;
      font-size: 32px;
      margin-bottom: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      padding: 14px 18px 8px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      height: 245px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      margin: 2px 0 8px;
      font-size: 20px;
    }

    .photo-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eeeeee;
      border-radius: 12px;
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .empty {
      color: #777;
      font-size: 18px;
    }

    .last-updated {
      font-size: 14px;
      color: #777;
      margin-bottom: 10px;
    }

    .status-message {
      margin: 14px auto 0;
      max-width: 760px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.4;
      display: none;
    }

    .status-message.error {
      display: block;
      background: #ffecec;
      border: 1px solid #f5a6a6;
      color: #8a1f1f;
    }

    .status-message.info {
      display: block;
      background: #eef6ff;
      border: 1px solid #99c7f3;
      color: #1f4f7a;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .control-button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 16px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .control-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .download-button {
      background: #1677ff;
      color: #ffffff;
    }

    .reset-button {
      background: #d93025;
      color: #ffffff;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-bar">
      <h1>Future Workplace with AI</h1>

      <div class="controls" aria-label="Image wall controls">
        <button class="control-button reset-button" id="resetDataButton" type="button">
          Reset data
        </button>
        <button class="control-button download-button" id="downloadAllButton" type="button" disabled>
          Download all images
        </button>
      </div>
    </div>

    <div class="top-section">
      <div class="instruction">
        <strong>Scan to upload image</strong>
        Vote within your team and upload the best image your team agrees on to compete with other teams. You can re-upload, but it will overwrite the previous submission.
      </div>

      <div class="qr-box">
        <img id="qrCode" src="" alt="QR code for image upload form">
      </div>
    </div>
  </header>

  <div class="grid" id="photoGrid"></div>

  <div class="status-message" id="statusMessage"></div>

  <div class="last-updated" id="lastUpdated"></div>

  <script>
    const TALLY_FORM_URL = "https://tally.so/r/aQAK92";
    // Replace with your actual Tally form link. Tally must also have its
    // Google Sheets integration enabled, otherwise scans will not create rows.

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6AyOSZWN0xtxHqDe0RwbLlt20T1pXspVV55HadWiSl8R7YRTGB5-BLxIwLsHie1fECw/exec";
    // IMPORTANT: Use the original Apps Script Web App URL that looks like:
    // https://script.google.com/macros/s/DEPLOYMENT_ID/exec
    // Do not paste the redirected script.googleusercontent.com/macros/echo URL;
    // those links are temporary and will stop returning sheet data.

    const statusMessage = document.getElementById("statusMessage");
    const downloadAllButton = document.getElementById("downloadAllButton");
    const resetDataButton = document.getElementById("resetDataButton");
    let latestTeams = [];
    let isResetting = false;

    function showStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${type}`;
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "status-message";
    }

    function isTemporaryAppsScriptUrl(url) {
      return /(^|\.)googleusercontent\.com\/macros\/echo/.test(url);
    }

    function isOriginalAppsScriptWebAppUrl(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(?:[?#].*)?$/.test(url);
    }

    function getUploadedPhotos() {
      return latestTeams.filter(item => item.photo);
    }

    function updateControlStates() {
      downloadAllButton.disabled = getUploadedPhotos().length === 0;
      resetDataButton.disabled = isResetting;
    }

    function getFileExtensionFromUrl(url) {
      try {
        const pathname = new URL(url).pathname;
        const extension = pathname.split(".").pop();

        if (extension && extension.length <= 5 && /^[a-z0-9]+$/i.test(extension)) {
          return extension;
        }
      } catch (error) {
        console.warn("Could not read file extension from URL:", error);
      }

      return "jpg";
    }

    function getSafeFileName(teamName, index, photoUrl) {
      const safeTeamName = String(teamName || `team-${index + 1}`)
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || `team-${index + 1}`;

      return `${safeTeamName}.${getFileExtensionFromUrl(photoUrl)}`;
    }

    async function downloadImage(photoUrl, fileName) {
      const link = document.createElement("a");
      link.style.display = "none";
      document.body.appendChild(link);

      try {
        const response = await fetch(photoUrl);

        if (!response.ok) {
          throw new Error(`Image returned HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        link.href = objectUrl;
        link.download = fileName;
        link.click();
        URL.revokeObjectURL(objectUrl);
      } catch (error) {
        console.warn(`Could not force-download ${photoUrl}; opening original image instead.`, error);
        link.href = photoUrl;
        link.target = "_blank";
        link.rel = "noopener";
        link.click();
      } finally {
        link.remove();
      }
    }

    async function downloadAllImages() {
      const photos = getUploadedPhotos();

      if (photos.length === 0) {
        showStatus("There are no uploaded images to download yet.", "info");
        return;
      }

      downloadAllButton.disabled = true;
      showStatus(`Starting download for ${photos.length} uploaded image${photos.length === 1 ? "" : "s"}...`, "info");

      for (const [index, item] of photos.entries()) {
        await downloadImage(item.photo, getSafeFileName(item.team, index, item.photo));
        await new Promise(resolve => setTimeout(resolve, 250));
      }

      showStatus(`Download started for ${photos.length} uploaded image${photos.length === 1 ? "" : "s"}.`, "info");
      updateControlStates();
    }

    async function resetData() {
      const confirmed = window.confirm(
        "Reset all submitted photo data? This clears the photo wall data if the Apps Script endpoint supports reset requests."
      );

      if (!confirmed) {
        return;
      }

      isResetting = true;
      updateControlStates();
      showStatus("Resetting photo wall data...", "info");

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ action: "reset" })
        });

        if (!response.ok) {
          throw new Error(`Apps Script returned HTTP ${response.status}`);
        }

        let result = null;
        const responseText = await response.text();

        if (responseText) {
          try {
            result = JSON.parse(responseText);
          } catch (error) {
            console.warn("Reset response was not JSON:", error);
          }
        }

        if (result && result.success === false) {
          throw new Error(result.message || "Apps Script rejected the reset request.");
        }

        latestTeams = latestTeams.map(item => ({ ...item, photo: "" }));
        renderPhotos(latestTeams);

        const reloaded = await loadPhotos({ preserveStatus: true });
        if (reloaded) {
          showStatus("Photo wall data reset successfully.", "info");
        }
      } catch (error) {
        console.error("Error resetting data:", error);
        showStatus(`Could not reset photo wall data: ${error.message}. Make sure Apps Script supports POST requests with { action: "reset" }.`, "error");
      } finally {
        isResetting = false;
        updateControlStates();
      }
    }

    function renderPhotos(teams) {
      const grid = document.getElementById("photoGrid");
      grid.innerHTML = "";

      teams.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${item.team}</h2>
          <div class="photo-box">
            ${
              item.photo
              ? `<img src="${item.photo}" alt="${item.team} photo">`
              : `<div class="empty">No photo uploaded</div>`
            }
          </div>
        `;

        grid.appendChild(card);
      });

      updateControlStates();
    }

    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
      + encodeURIComponent(TALLY_FORM_URL);

    document.getElementById("qrCode").src = qrUrl;

    async function loadPhotos({ preserveStatus = false } = {}) {
      if (isTemporaryAppsScriptUrl(APPS_SCRIPT_URL)) {
        showStatus(
          "Apps Script URL is a temporary redirected googleusercontent.com link. Replace APPS_SCRIPT_URL in index.html with the original https://script.google.com/macros/s/.../exec Web App URL, then redeploy this page.",
          "error"
        );
        return false;
      }

      if (!isOriginalAppsScriptWebAppUrl(APPS_SCRIPT_URL)) {
        showStatus(
          "Apps Script URL must be the original https://script.google.com/macros/s/.../exec Web App URL. Check APPS_SCRIPT_URL in index.html, then redeploy this page.",
          "error"
        );
        return false;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Apps Script returned HTTP ${response.status}`);
        }

        const teams = await response.json();

        if (!Array.isArray(teams)) {
          throw new Error("Apps Script response must be a JSON array of teams.");
        }

        latestTeams = teams;
        renderPhotos(latestTeams);

        if (!preserveStatus) {
          clearStatus();
        }

        document.getElementById("lastUpdated").innerText =
          "Last updated: " + new Date().toLocaleTimeString();

        return true;
      } catch (error) {
        console.error("Error loading photos:", error);
        showStatus(`Could not load Google Sheet data: ${error.message}`, "error");
        return false;
      }
    }

    downloadAllButton.addEventListener("click", downloadAllImages);
    resetDataButton.addEventListener("click", resetData);

    loadPhotos();

    setInterval(loadPhotos, 5000);
  </script>

</body>
</html>

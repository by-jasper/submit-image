<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Future Workplace with AI</title>

  <style>
    :root {
      --smrt-red: #e31b23;
      --smrt-dark: #152238;
      --smrt-light: #f7fafc;
      --crocodile-green: #2f6b3a;
      --ribbon-gradient: linear-gradient(90deg, #4f9f5f 0%, #2f6b3a 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: var(--smrt-dark);
      text-align: center;
    }

    header {
      position: relative;
      background: var(--crocodile-green);
      min-height: 12.5vh;
      padding: 9px 18px;
      box-shadow: 0 8px 24px rgba(21,34,56,0.12);
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 8px;
      background: var(--ribbon-gradient);
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .top-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-width: 0;
      flex: 1;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #ffffff;
      letter-spacing: -0.5px;
      text-align: left;
    }

    .qr-box {
      flex: 0 0 auto;
      padding: 6px;
      border: 2px solid #ffffff;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(227,27,35,0.16);
      cursor: pointer;
    }

    .qr-box img {
      display: block;
      width: 84px;
      height: 84px;
      border-radius: 8px;
    }

    .instruction {
      max-width: 860px;
      font-size: 15px;
      line-height: 1.35;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .instruction {
      color: #ffffff;
    }

    .instruction p {
      margin: 0;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .scan-label {
      margin: 0;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    .grid {
      column-count: 4;
      column-gap: 16px;
      padding: 18px 22px 10px;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(227,27,35,0.12);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(21,34,56,0.14);
      display: inline-block;
      width: 100%;
      margin: 0 0 16px;
      break-inside: avoid;
      overflow: hidden;
    }



    @media (max-width: 1200px) {
      .grid {
        column-count: 3;
      }
    }

    @media (max-width: 900px) {
      .grid {
        column-count: 2;
      }
    }

    @media (max-width: 640px) {
      .grid {
        column-count: 1;
      }
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: var(--ribbon-gradient);
    }

    .card h2 {
      position: relative;
      margin: 6px 0 10px;
      font-size: 20px;
      color: var(--smrt-dark);
    }

    .photo-box {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 2px dashed #ffffff;
      border-radius: 14px;
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .empty {
      color: var(--smrt-dark);
      font-size: 18px;
      font-weight: 700;
      opacity: 0.72;
    }

    .last-updated {
      font-size: 14px;
      color: #777;
      margin-bottom: 10px;
    }

    .status-message {
      margin: 14px auto 0;
      max-width: 760px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.4;
      display: none;
    }

    .status-message.error {
      display: block;
      background: #ffecec;
      border: 1px solid #f5a6a6;
      color: #8a1f1f;
    }

    .status-message.info {
      display: block;
      background: #eef6ff;
      border: 1px solid #99c7f3;
      color: #1f4f7a;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .control-button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 16px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .control-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .control-button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .download-button {
      background: #1677ff;
      color: #ffffff;
    }

    .reset-button {
      background: #d93025;
      color: #ffffff;
    }

    .qr-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .qr-modal.open {
      display: flex;
    }

    .qr-modal img {
      width: min(90vmin, 95vw);
      height: min(90vmin, 95vw);
      object-fit: contain;
      background: #ffffff;
      border-radius: 20px;
      padding: 12px;
    }

    .close-qr {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ffffff;
      color: #152238;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 20px;
    }

    .image-modal.open {
      display: flex;
    }

    .image-modal img {
      max-width: min(96vw, 1200px);
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      background: #ffffff;
      padding: 8px;
    }

    .close-image {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #ffffff;
      color: #152238;
    }

  </style>
</head>

<body>

  <header>
    <div class="header-bar">
      <div class="top-section">
        <div class="qr-section">
          <div class="qr-box">
            <img id="qrCode" src="" alt="QR code for image upload form">
          </div>
          <p class="scan-label">Scan to upload</p>
        </div>

        <div class="instruction">
          <h1>Future Workplace with AI</h1>
          <p>Vote within your team and upload your best selected image. You may re-upload, but only the latest submission will be kept.</p>
        </div>
      </div>

      <div class="controls" aria-label="Image wall controls">
        <button class="control-button reset-button" id="resetDataButton" type="button">
          Reset data
        </button>
        <button class="control-button download-button" id="downloadAllButton" type="button" disabled>
          Download all images
        </button>
      </div>
    </div>
  </header>



  <div class="qr-modal" id="qrModal" aria-hidden="true">
    <button class="close-qr" id="closeQrButton" type="button">Reduce QR</button>
    <img id="qrModalImage" src="" alt="Expanded QR code">
  </div>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <button class="close-image" id="closeImageButton" type="button">Back</button>
    <img id="imageModalImage" src="" alt="Expanded team image">
  </div>

  <div class="grid" id="photoGrid"></div>

  <div class="status-message" id="statusMessage"></div>

  <div class="last-updated" id="lastUpdated"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const TALLY_FORM_URL = "https://tally.so/r/aQAK92";
    // Replace with your actual Tally form link. Tally must also have its
    // Google Sheets integration enabled, otherwise scans will not create rows.

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6AyOSZWN0xtxHqDe0RwbLlt20T1pXspVV55HadWiSl8R7YRTGB5-BLxIwLsHie1fECw/exec";
    // IMPORTANT: Use the original Apps Script Web App URL that looks like:
    // https://script.google.com/macros/s/DEPLOYMENT_ID/exec
    // Do not paste the redirected script.googleusercontent.com/macros/echo URL;
    // those links are temporary and will stop returning sheet data.

    const statusMessage = document.getElementById("statusMessage");
    const downloadAllButton = document.getElementById("downloadAllButton");
    const resetDataButton = document.getElementById("resetDataButton");

    const qrCode = document.getElementById("qrCode");
    const qrModal = document.getElementById("qrModal");
    const qrModalImage = document.getElementById("qrModalImage");
    const closeQrButton = document.getElementById("closeQrButton");
    const imageModal = document.getElementById("imageModal");
    const imageModalImage = document.getElementById("imageModalImage");
    const closeImageButton = document.getElementById("closeImageButton");
    let latestTeams = [];
    let isResetting = false;

    function showStatus(message, type = "info") {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${type}`;
    }

    function clearStatus() {
      statusMessage.textContent = "";
      statusMessage.className = "status-message";
    }

    function isTemporaryAppsScriptUrl(url) {
      return /(^|\.)googleusercontent\.com\/macros\/echo/.test(url);
    }

    function isOriginalAppsScriptWebAppUrl(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(?:[?#].*)?$/.test(url);
    }

    function getUploadedPhotos() {
      return latestTeams.filter(item => item.photo);
    }

    function updateControlStates() {
      const noPhotos = getUploadedPhotos().length === 0;
      downloadAllButton.disabled = noPhotos;
      resetDataButton.disabled = isResetting;
    }

    function getFileExtensionFromUrl(url) {
      try {
        const pathname = new URL(url).pathname;
        const extension = pathname.split(".").pop();

        if (extension && extension.length <= 5 && /^[a-z0-9]+$/i.test(extension)) {
          return extension;
        }
      } catch (error) {
        console.warn("Could not read file extension from URL:", error);
      }

      return "jpg";
    }

    function getSafeFileName(teamName, index, photoUrl) {
      const safeTeamName = String(teamName || `team-${index + 1}`)
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || `team-${index + 1}`;

      return `${safeTeamName}.${getFileExtensionFromUrl(photoUrl)}`;
    }

    async function fetchImageBlob(photoUrl) {
      const response = await fetch(photoUrl);

      if (!response.ok) {
        throw new Error(`Image returned HTTP ${response.status}`);
      }

      return response.blob();
    }

    async function downloadAllImages() {
      const photos = getUploadedPhotos();

      if (photos.length === 0) {
        showStatus("There are no uploaded images to download yet.", "info");
        return;
      }

      if (typeof JSZip === "undefined") {
        showStatus("ZIP library failed to load. Check network/CDN availability.", "error");
        return;
      }

      downloadAllButton.disabled = true;
      showStatus(`Building ZIP for ${photos.length} uploaded image${photos.length === 1 ? "" : "s"}...`, "info");

      try {
        const zip = new JSZip();

        for (const [index, item] of photos.entries()) {
          const blob = await fetchImageBlob(item.photo);
          zip.file(getSafeFileName(item.team, index, item.photo), blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const zipUrl = URL.createObjectURL(zipBlob);
        const link = document.createElement("a");
        link.href = zipUrl;
        link.download = `uploaded-images-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-")}.zip`;
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(zipUrl);

        showStatus(`Downloaded ZIP with ${photos.length} image${photos.length === 1 ? "" : "s"}.`, "info");
      } catch (error) {
        console.error("Error downloading ZIP:", error);
        showStatus(`Could not build ZIP file: ${error.message}`, "error");
      } finally {
        updateControlStates();
      }
    }

    async function tryResetRequest() {
      const requests = [
        {
          label: "POST JSON",
          run: () => fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "reset" })
          })
        },
        {
          label: "POST form",
          run: () => fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: "action=reset"
          })
        },
        {
          label: "GET query",
          run: () => fetch(`${APPS_SCRIPT_URL}${APPS_SCRIPT_URL.includes("?") ? "&" : "?"}action=reset`, {
            cache: "no-store"
          })
        }
      ];

      for (const request of requests) {
        try {
          const response = await request.run();

          if (!response.ok) {
            continue;
          }

          const text = await response.text();
          let result = null;

          if (text) {
            try {
              result = JSON.parse(text);
            } catch (error) {
              console.warn(`Reset response for ${request.label} was not JSON:`, error);
            }
          }

          if (result && result.success === false) {
            throw new Error(result.message || `Apps Script rejected reset via ${request.label}.`);
          }

          return true;
        } catch (error) {
          console.warn(`Reset attempt failed using ${request.label}:`, error);
        }
      }

      return false;
    }

    async function resetData() {
      const confirmed = window.confirm(
        "Reset all submitted photo data? This deletes all existing response rows if the Apps Script endpoint supports reset requests."
      );

      if (!confirmed) {
        return;
      }

      isResetting = true;
      updateControlStates();
      showStatus("Resetting photo wall data...", "info");

      try {
        const resetRequested = await tryResetRequest();
        const reloaded = await loadPhotos({ preserveStatus: true });

        if (reloaded && getUploadedPhotos().length === 0) {
          showStatus("Photo wall data reset successfully.", "info");
          return;
        }

        if (!resetRequested || getUploadedPhotos().length > 0) {
          showStatus("Reset request sent, but uploaded images are still present. Update your Apps Script to handle action=reset and delete response rows.", "error");
          return;
        }

        showStatus("Photo wall data reset successfully.", "info");
      } catch (error) {
        console.error("Error resetting data:", error);
        showStatus(`Could not reset photo wall data: ${error.message}.`, "error");
      } finally {
        isResetting = false;
        updateControlStates();
      }
    }

    function renderPhotos(teams) {
      const grid = document.getElementById("photoGrid");
      grid.innerHTML = "";

      teams.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${item.team}</h2>
          <div class="photo-box">
            ${
              item.photo
              ? `<img src="${item.photo}" alt="${item.team} photo" class="team-photo" data-team-photo="true">`
              : `<div class="empty">No image uploaded</div>`
            }
          </div>
        `;

        grid.appendChild(card);
      });

      updateControlStates();
    }

    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
      + encodeURIComponent(TALLY_FORM_URL);

    qrCode.src = qrUrl;


    function openQrModal() {
      qrModalImage.src = qrCode.src;
      qrModal.classList.add("open");
      qrModal.setAttribute("aria-hidden", "false");
    }

    function closeQrModal() {
      qrModal.classList.remove("open");
      qrModal.setAttribute("aria-hidden", "true");
    }

    function openImageModal(photoUrl, teamName) {
      imageModalImage.src = photoUrl;
      imageModalImage.alt = `${teamName} enlarged image`;
      imageModal.classList.add("open");
      imageModal.setAttribute("aria-hidden", "false");
    }

    function closeImageModal() {
      imageModal.classList.remove("open");
      imageModal.setAttribute("aria-hidden", "true");
      imageModalImage.src = "";
    }

    async function loadPhotos({ preserveStatus = false } = {}) {
      if (isTemporaryAppsScriptUrl(APPS_SCRIPT_URL)) {
        showStatus(
          "Apps Script URL is a temporary redirected googleusercontent.com link. Replace APPS_SCRIPT_URL in index.html with the original https://script.google.com/macros/s/.../exec Web App URL, then redeploy this page.",
          "error"
        );
        return false;
      }

      if (!isOriginalAppsScriptWebAppUrl(APPS_SCRIPT_URL)) {
        showStatus(
          "Apps Script URL must be the original https://script.google.com/macros/s/.../exec Web App URL. Check APPS_SCRIPT_URL in index.html, then redeploy this page.",
          "error"
        );
        return false;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Apps Script returned HTTP ${response.status}`);
        }

        const teams = await response.json();

        if (!Array.isArray(teams)) {
          throw new Error("Apps Script response must be a JSON array of teams.");
        }

        latestTeams = teams;
        renderPhotos(latestTeams);

        if (!preserveStatus) {
          clearStatus();
        }

        document.getElementById("lastUpdated").innerText =
          "Last updated: " + new Date().toLocaleTimeString();

        return true;
      } catch (error) {
        console.error("Error loading photos:", error);
        showStatus(`Could not load Google Sheet data: ${error.message}`, "error");
        return false;
      }
    }

    qrCode.addEventListener("click", openQrModal);
    closeQrButton.addEventListener("click", closeQrModal);
    qrModal.addEventListener("click", event => {
      if (event.target === qrModal) {
        closeQrModal();
      }
    });
    closeImageButton.addEventListener("click", closeImageModal);
    imageModal.addEventListener("click", event => {
      if (event.target === imageModal) {
        closeImageModal();
      }
    });
    document.getElementById("photoGrid").addEventListener("click", event => {
      const clickedImage = event.target.closest('[data-team-photo="true"]');
      if (!clickedImage) {
        return;
      }

      openImageModal(clickedImage.src, clickedImage.alt.replace(" photo", ""));
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeQrModal();
        closeImageModal();
      }
    });

    downloadAllButton.addEventListener("click", downloadAllImages);
    resetDataButton.addEventListener("click", resetData);

    loadPhotos();

    setInterval(loadPhotos, 5000);
  </script>

</body>
</html>
